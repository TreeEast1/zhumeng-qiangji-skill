version: 1
description: Constraints for school mode reasoning.
rules:
  - id: fujiaonan_mode_no_default_uniform_shortlist_line
    when:
      mentions_mode:
        - fujiaonan_style
    action:
      prohibited_statement:
        - 统一入围线
      unless:
        evidence_status_in:
          - official_verified
          - structured_record
  - id: mode_comparison_requires_scope_control
    when:
      comparing_modes: true
    action:
      must_say:
        - 模式比较不等于当年具体政策结论
  - id: timeline_terms_must_not_be_swapped
    when:
      mentions_terms:
        - 出分前校测
        - 出分后校测
    action:
      prohibited_behavior:
        - swap_timeline_meaning
  - id: direct_exam_is_not_universal
    when:
      mentions_terms:
        - 报名成功直接参加校测
    action:
      must_say:
        - 该规则只适用于部分院校与年份
      prohibited_statement:
        - 所有学校都这样
  - id: interview_only_not_equal_easier
    when:
      mentions_terms:
        - 只考面试
    action:
      prohibited_statement:
        - 更容易录取
        - 门槛更低
      must_say:
        - 只考面试不等于没有门槛
  - id: fujiaonan_pre_score_exam_requires_exam_timeline_binding
    when:
      mentions_mode:
        - fujiaonan_style
    action:
      must_include:
        - exam_timeline
      must_say:
        - 复交南风格通常涉及高考后出分前校测

